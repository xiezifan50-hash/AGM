[agents.orchestrator]
model = "gpt-5.4-mini"
reasoning_effort = "low"
sandbox = "read-only"
approval_policy = "never"
search = false

[agents.generator]
model = "gpt-5.3-codex"
reasoning_effort = "medium"
sandbox = "workspace-write"
approval_policy = "on-request"
search = false

[agents.evaluator]
model = "gpt-5.4"
reasoning_effort = "medium"
sandbox = "read-only"
approval_policy = "never"
search = false

[agents.reviewer]
model = "gpt-5.4-mini"
reasoning_effort = "medium"
sandbox = "read-only"
approval_policy = "never"
search = false

[codex]
binary = "codex"
search = false
skip_git_repo_check = true
agent_timeout_seconds = 900

[negotiation]
max_rounds = 2

[implementation]
l1_retry_limit = 3
check_timeout_seconds = 300

[review]
max_concurrency = 4

[safety]
network_access = false
dangerous_approval_policy = "on-request"
